---
- name: Configure Wahaj DevOps EC2 - FA22-BSE-100
  hosts: ec2
  become: true

  vars:
    app_image: wahaj-app
    app_port: 3000
    grafana_port: 3030
    prometheus_version: "2.47.0"
    node_exporter_version: "1.6.1"

  tasks:

    # ─── System Update ────────────────────────────────────────────────────────
    - name: Update apt package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install system dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - software-properties-common
          - wget
          - git
          - python3-pip
          - conntrack
        state: present

    # ─── Docker ───────────────────────────────────────────────────────────────
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable"
        state: present

    - name: Install Docker CE
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    # ─── kubectl ──────────────────────────────────────────────────────────────
    - name: Download kubectl
      get_url:
        url: https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl
        dest: /usr/local/bin/kubectl
        mode: '0755'

    # ─── Minikube ─────────────────────────────────────────────────────────────
    - name: Download Minikube
      get_url:
        url: https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
        dest: /usr/local/bin/minikube
        mode: '0755'

    - name: Start Minikube (as ubuntu user, using Docker driver)
      become: false
      shell: |
        minikube status | grep -q "Running" || \
        minikube start --driver=docker --memory=2048 --cpus=2
      register: minikube_start
      changed_when: "'Starting' in minikube_start.stdout"

    # ─── Prometheus ───────────────────────────────────────────────────────────
    - name: Create prometheus system user
      user:
        name: prometheus
        shell: /bin/false
        create_home: no
        system: yes

    - name: Create prometheus directories
      file:
        path: "{{ item }}"
        state: directory
        owner: prometheus
        group: prometheus
        mode: '0755'
      loop:
        - /etc/prometheus
        - /var/lib/prometheus

    - name: Download Prometheus archive
      get_url:
        url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
        dest: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"

    - name: Extract Prometheus
      unarchive:
        src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
        dest: /tmp
        remote_src: yes

    - name: Copy Prometheus binaries
      copy:
        src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        remote_src: yes
        mode: '0755'
        owner: prometheus
        group: prometheus
      loop:
        - prometheus
        - promtool

    - name: Copy Prometheus console files
      copy:
        src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
        dest: "/etc/prometheus/{{ item }}"
        remote_src: yes
        owner: prometheus
        group: prometheus
      loop:
        - consoles
        - console_libraries

    - name: Write Prometheus config
      copy:
        dest: /etc/prometheus/prometheus.yml
        owner: prometheus
        group: prometheus
        content: |
          global:
            scrape_interval: 15s
            evaluation_interval: 15s

          scrape_configs:
            - job_name: 'prometheus'
              static_configs:
                - targets: ['localhost:9090']

            - job_name: 'node_exporter'
              static_configs:
                - targets: ['localhost:9100']

            - job_name: 'jenkins'
              metrics_path: '/prometheus'
              static_configs:
                - targets: ['localhost:8080']

    - name: Create Prometheus systemd service
      copy:
        dest: /etc/systemd/system/prometheus.service
        content: |
          [Unit]
          Description=Prometheus Monitoring
          Wants=network-online.target
          After=network-online.target

          [Service]
          User=prometheus
          Group=prometheus
          Type=simple
          ExecStart=/usr/local/bin/prometheus \
            --config.file=/etc/prometheus/prometheus.yml \
            --storage.tsdb.path=/var/lib/prometheus/ \
            --web.console.templates=/etc/prometheus/consoles \
            --web.console.libraries=/etc/prometheus/console_libraries \
            --web.listen-address=0.0.0.0:9090

          [Install]
          WantedBy=multi-user.target

    - name: Start and enable Prometheus
      systemd:
        name: prometheus
        state: started
        enabled: yes
        daemon_reload: yes

    # ─── Node Exporter ────────────────────────────────────────────────────────
    - name: Create node_exporter system user
      user:
        name: node_exporter
        shell: /bin/false
        create_home: no
        system: yes

    - name: Download Node Exporter archive
      get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"

    - name: Extract Node Exporter
      unarchive:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: /tmp
        remote_src: yes

    - name: Copy Node Exporter binary
      copy:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
        dest: /usr/local/bin/node_exporter
        remote_src: yes
        mode: '0755'
        owner: node_exporter
        group: node_exporter

    - name: Create Node Exporter systemd service
      copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Node Exporter
          Wants=network-online.target
          After=network-online.target

          [Service]
          User=node_exporter
          Group=node_exporter
          Type=simple
          ExecStart=/usr/local/bin/node_exporter

          [Install]
          WantedBy=multi-user.target

    - name: Start and enable Node Exporter
      systemd:
        name: node_exporter
        state: started
        enabled: yes
        daemon_reload: yes

    # ─── Grafana ──────────────────────────────────────────────────────────────
    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Grafana GPG key
      shell: wget -q -O - https://apt.grafana.com/gpg.key | gpg --dearmor | tee /etc/apt/keyrings/grafana.gpg > /dev/null
      args:
        creates: /etc/apt/keyrings/grafana.gpg

    - name: Add Grafana repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/grafana.gpg] https://apt.grafana.com stable main"
        state: present
        filename: grafana

    - name: Install Grafana
      apt:
        name: grafana
        state: present
        update_cache: yes

    - name: Set Grafana port to 3030
      lineinfile:
        path: /etc/grafana/grafana.ini
        regexp: '^;http_port'
        line: 'http_port = 3030'
        insertafter: '^\[server\]'

    - name: Start and enable Grafana
      systemd:
        name: grafana-server
        state: started
        enabled: yes
        daemon_reload: yes

    # ─── Deploy App to Kubernetes ─────────────────────────────────────────────
    - name: Copy Kubernetes manifests to server
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        mode: '0644'
      loop:
        - { src: "../kubernetes/namespace.yaml", dest: "/home/ubuntu/k8s-namespace.yaml" }
        - { src: "../kubernetes/deployment.yaml", dest: "/home/ubuntu/k8s-deployment.yaml" }
        - { src: "../kubernetes/service.yaml",    dest: "/home/ubuntu/k8s-service.yaml" }

    - name: Apply Kubernetes manifests
      become: false
      shell: |
        kubectl apply -f /home/ubuntu/k8s-namespace.yaml
        kubectl apply -f /home/ubuntu/k8s-deployment.yaml
        kubectl apply -f /home/ubuntu/k8s-service.yaml
      register: k8s_apply
      ignore_errors: yes

    - name: Show Kubernetes deployment status
      become: false
      shell: kubectl get pods -n wahaj-app
      register: k8s_status
      ignore_errors: yes

    - name: Print pod status
      debug:
        msg: "{{ k8s_status.stdout_lines }}"
