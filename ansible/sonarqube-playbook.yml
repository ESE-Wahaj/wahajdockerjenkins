---
- name: Install and Configure SonarQube - FA22-BSE-100
  hosts: ec2
  become: true

  vars:
    sonar_version: "10.4.1.88267"
    sonar_user: sonarqube
    sonar_dir: /opt/sonarqube
    sonar_port: 9000
    pg_db: sonarqube
    pg_user: sonar
    pg_password: "SonarPass2024!"

  tasks:

    # ─── System Prerequisites ─────────────────────────────────────────────────
    - name: Set vm.max_map_count (required by SonarQube / Elasticsearch)
      sysctl:
        name: vm.max_map_count
        value: "524288"
        state: present
        reload: yes

    - name: Set fs.file-max
      sysctl:
        name: fs.file-max
        value: "131072"
        state: present
        reload: yes

    - name: Set ulimits for sonarqube user
      blockinfile:
        path: /etc/security/limits.conf
        marker: "# {mark} SONARQUBE LIMITS"
        block: |
          sonarqube   -   nofile   131072
          sonarqube   -   nproc    8192

    # ─── Java 17 ──────────────────────────────────────────────────────────────
    - name: Install Java 17
      apt:
        name: openjdk-17-jdk
        state: present
        update_cache: yes

    - name: Verify Java version
      command: java -version
      register: java_version
      changed_when: false

    # ─── PostgreSQL ───────────────────────────────────────────────────────────
    - name: Install PostgreSQL
      apt:
        name:
          - postgresql
          - postgresql-contrib
          - python3-psycopg2
        state: present

    - name: Start and enable PostgreSQL
      systemd:
        name: postgresql
        state: started
        enabled: yes

    - name: Create sonar PostgreSQL user
      become_user: postgres
      postgresql_user:
        name: "{{ pg_user }}"
        password: "{{ pg_password }}"
        state: present

    - name: Create sonarqube database
      become_user: postgres
      postgresql_db:
        name: "{{ pg_db }}"
        owner: "{{ pg_user }}"
        encoding: UTF8
        state: present

    # ─── SonarQube ────────────────────────────────────────────────────────────
    - name: Create sonarqube system user
      user:
        name: "{{ sonar_user }}"
        shell: /bin/bash
        create_home: yes
        system: yes

    - name: Download SonarQube Community Edition
      get_url:
        url: "https://binaries.sonarsource.com/Distribution/sonarqube/sonarqube-{{ sonar_version }}.zip"
        dest: "/tmp/sonarqube-{{ sonar_version }}.zip"
        timeout: 120

    - name: Install unzip
      apt:
        name: unzip
        state: present

    - name: Extract SonarQube
      unarchive:
        src: "/tmp/sonarqube-{{ sonar_version }}.zip"
        dest: /opt
        remote_src: yes

    - name: Rename SonarQube directory
      command: mv /opt/sonarqube-{{ sonar_version }} {{ sonar_dir }}
      args:
        creates: "{{ sonar_dir }}"

    - name: Set ownership of SonarQube directory
      file:
        path: "{{ sonar_dir }}"
        owner: "{{ sonar_user }}"
        group: "{{ sonar_user }}"
        recurse: yes

    - name: Configure SonarQube database connection
      blockinfile:
        path: "{{ sonar_dir }}/conf/sonar.properties"
        marker: "# {mark} ANSIBLE MANAGED DB CONFIG"
        block: |
          sonar.jdbc.username={{ pg_user }}
          sonar.jdbc.password={{ pg_password }}
          sonar.jdbc.url=jdbc:postgresql://localhost/{{ pg_db }}
          sonar.web.host=0.0.0.0
          sonar.web.port={{ sonar_port }}
          sonar.search.javaAdditionalOpts=-Dnode.store.allow_mmap=false

    - name: Create SonarQube systemd service
      copy:
        dest: /etc/systemd/system/sonarqube.service
        content: |
          [Unit]
          Description=SonarQube Code Quality Platform
          After=network.target postgresql.service
          Wants=postgresql.service

          [Service]
          Type=forking
          ExecStart={{ sonar_dir }}/bin/linux-x86-64/sonar.sh start
          ExecStop={{ sonar_dir }}/bin/linux-x86-64/sonar.sh stop
          User={{ sonar_user }}
          Group={{ sonar_user }}
          Restart=always
          LimitNOFILE=131072
          LimitNPROC=8192
          TimeoutStartSec=5min

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd and start SonarQube
      systemd:
        name: sonarqube
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Wait for SonarQube to be ready (can take 2-3 minutes)
      uri:
        url: "http://localhost:{{ sonar_port }}/api/system/status"
        method: GET
        status_code: 200
      register: sonar_status
      until: sonar_status.json.status == "UP"
      retries: 30
      delay: 10

    # ─── Install SonarScanner (for Jenkins) ───────────────────────────────────
    - name: Download SonarScanner CLI
      get_url:
        url: "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip"
        dest: /tmp/sonar-scanner.zip

    - name: Extract SonarScanner to /opt
      unarchive:
        src: /tmp/sonar-scanner.zip
        dest: /opt
        remote_src: yes

    - name: Symlink sonar-scanner to /usr/local/bin
      file:
        src: /opt/sonar-scanner-5.0.1.3006-linux/bin/sonar-scanner
        dest: /usr/local/bin/sonar-scanner
        state: link
        force: yes

    - name: Verify sonar-scanner is accessible
      command: sonar-scanner --version
      register: scanner_version
      changed_when: false

    - name: Print SonarQube URL
      debug:
        msg: "SonarQube is ready at http://{{ ansible_host }}:{{ sonar_port }} — default login: admin / admin"
